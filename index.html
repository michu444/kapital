<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mój kapitał</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kapitał">
<meta name="theme-color" content="#1f1703">
<style>
  :root{
    --bg:#1f1703; --card:#2c2108; --line:#4d3c10; --ink:#fdf6e3;
    --dim:#d4b45a; --faint:#8a7231; --accent:#ffc93c; --neg:#ff7d6b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:env(safe-area-inset-top) 18px 60px;
    max-width:480px; margin:0 auto;
  }
  header{padding-top:28px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
  .total{font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:2px}
  .sub{color:var(--dim);font-size:13px;margin-top:4px;min-height:18px}

  .tabs{display:flex;gap:8px;margin-top:22px}
  .tab{
    flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--line);
    background:transparent;color:var(--dim);font-size:14px;font-weight:600;cursor:pointer
  }
  .tab.active{background:var(--card);color:var(--ink);border-color:var(--accent)}

  .chart-wrap{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 10px 6px}

  .limit{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .limit-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--dim)}
  .limit-head button{background:none;border:none;color:var(--faint);font-size:12px;cursor:pointer;padding:2px 0}
  .limit-head button:active{color:var(--accent)}
  .bar{margin-top:10px;height:10px;border-radius:6px;background:var(--bg);border:1px solid var(--line);overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);border-radius:6px;width:0%;transition:width .4s ease}
  .bar-fill.full{background:var(--neg)}
  .limit-sub{margin-top:8px;font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .limit-form{display:flex;gap:8px;margin-top:10px}
  .limit-form input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:9px 12px;font-size:16px;font-variant-numeric:tabular-nums}
  .limit-form input:focus{outline:none;border-color:var(--accent)}
  .limit-form button{background:var(--accent);color:#241a04;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:14px;cursor:pointer}
  svg{display:block;width:100%;height:210px}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:40px 10px}

  form{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .form-title{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:10px}
  .row{display:flex;gap:8px}
  input{
    background:var(--bg);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:10px 12px;font-size:16px;width:100%;
    font-variant-numeric:tabular-nums
  }
  input:focus{outline:none;border-color:var(--accent)}
  input[type=date]{color-scheme:dark}
  #amount{width:110px;flex:none}
  button.save{
    margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;
    background:var(--accent);color:#241a04;font-size:15px;font-weight:700;cursor:pointer
  }
  button.save:active{opacity:.8}
  .hint{font-size:12px;color:var(--faint);margin-top:8px}
  .error{color:var(--neg);font-size:13px;margin-top:8px}

  .hist{margin-top:22px}
  .hist ul{list-style:none}
  .hist li{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 2px;border-bottom:1px solid rgba(20,81,63,.5);font-size:14px
  }
  .hist .d{color:var(--dim)}
  .hist .a{font-variant-numeric:tabular-nums;font-weight:600}
  .hist .a.minus{color:var(--neg)}
  .hist button{background:none;border:none;color:var(--faint);font-size:13px;cursor:pointer;padding:4px 0 4px 14px}
  .hist button:active{color:var(--neg)}
</style>
</head>
<body>
<header>
  <p class="eyebrow" id="eyebrow">Kapitał wpłacony · IKE</p>
  <h1 class="total" id="total">0 zł</h1>
  <p class="sub" id="sub"></p>
</header>

<div class="tabs">
  <button class="tab active" id="tab-ike">IKE</button>
  <button class="tab" id="tab-osz">Oszczędności</button>
</div>

<div class="limit" id="limit-card" style="display:none">
  <div class="limit-head">
    <span id="limit-label">Limit IKE 2026</span>
    <button type="button" id="limit-edit">Zmień limit</button>
  </div>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
  <p class="limit-sub" id="limit-sub"></p>
  <div class="limit-form" id="limit-form" style="display:none">
    <input id="limit-input" type="text" inputmode="decimal" placeholder="28260">
    <button type="button" id="limit-save">OK</button>
  </div>
</div>

<div class="chart-wrap"><div id="chart"><p class="empty">Brak danych — dodaj pierwszy wpis poniżej.</p></div></div>

<form id="form" autocomplete="off">
  <p class="form-title" id="form-title">Dodaj wpłatę na IKE</p>
  <div class="row">
    <input id="amount" type="text" inputmode="text" placeholder="200">
    <input id="date" type="date">
  </div>
  <button class="save" type="submit" id="save-btn">Zapisz</button>
  <p class="hint" id="hint"></p>
  <p class="error" id="error"></p>
</form>

<div class="hist"><ul id="list"></ul></div>

<script>
(function(){
  var MODES = {
    ike: {key:"kap_ike", eyebrow:"Kapitał wpłacony · IKE", form:"Dodaj wpłatę na IKE",
          hint:"", negatives:false, def:"200"},
    osz: {key:"kap_osz", eyebrow:"Poduszka i oszczędności", form:"Dodaj zmianę oszczędności",
          hint:"Wpłata: np. 2500. Wypłata: ze znakiem minus, np. -800.", negatives:true, def:""}
  };
  var mode = "ike";

  var $ = function(id){return document.getElementById(id)};
  var fmt = function(n){
    return new Intl.NumberFormat("pl-PL",{maximumFractionDigits:0}).format(n)+" zł";
  };
  var fmtD = function(iso){
    var d = new Date(iso+"T00:00:00");
    return d.toLocaleDateString("pl-PL",{day:"numeric",month:"short",year:"2-digit"});
  };

  function load(){
    try{ return JSON.parse(localStorage.getItem(MODES[mode].key)) || []; }
    catch(e){ return []; }
  }
  function store(arr){
    localStorage.setItem(MODES[mode].key, JSON.stringify(arr));
  }

  function render(){
    var cfg = MODES[mode];
    var data = load().sort(function(a,b){return a.date<b.date?-1:1});
    $("eyebrow").textContent = cfg.eyebrow;
    $("form-title").textContent = cfg.form;
    $("hint").textContent = cfg.hint;
    $("amount").placeholder = cfg.def || "kwota";
    $("amount").value = "";
    $("error").textContent = "";
    $("date").value = new Date().toISOString().slice(0,10);
    $("tab-ike").className = "tab"+(mode==="ike"?" active":"");
    $("tab-osz").className = "tab"+(mode==="osz"?" active":"");

    var total = data.reduce(function(s,e){return s+e.amount},0);
    $("total").textContent = fmt(total);
    $("sub").textContent = data.length
      ? data.length+" "+(data.length===1?"wpis":(data.length<5?"wpisy":"wpisów"))
      : "";

    // IKE annual limit
    var card=$("limit-card");
    if(mode==="ike"){
      var year=new Date().getFullYear();
      var lim=parseFloat(localStorage.getItem("kap_ike_limit_"+year))||28260;
      var used=data.reduce(function(s,e){
        return s+(e.date.slice(0,4)==String(year)?e.amount:0);
      },0);
      var pct=Math.min(100,used/lim*100);
      card.style.display="block";
      $("limit-label").textContent="Limit IKE "+year;
      var bf=$("bar-fill");
      bf.style.width=pct+"%";
      bf.className="bar-fill"+(used>=lim?" full":"");
      $("limit-sub").textContent=
        fmt(used)+" z "+fmt(lim)+" ("+pct.toFixed(1).replace(".",",")+"%) · zostało "+fmt(Math.max(0,lim-used));
    } else {
      card.style.display="none";
    }

    // history (newest first)
    var list = $("list"); list.innerHTML = "";
    data.slice().reverse().forEach(function(e){
      var li = document.createElement("li");
      var neg = e.amount < 0;
      li.innerHTML =
        '<span class="d">'+fmtD(e.date)+'</span>'+
        '<span class="a'+(neg?' minus':'')+'">'+(neg?"−":"+")+fmt(Math.abs(e.amount))+'</span>';
      var del = document.createElement("button");
      del.textContent = "Usuń";
      del.onclick = function(){
        store(load().filter(function(x){return x.id!==e.id}));
        render();
      };
      li.appendChild(del);
      list.appendChild(li);
    });

    drawChart(data);
  }

  function drawChart(data){
    var box = $("chart");
    if(data.length===0){
      box.innerHTML = '<p class="empty">Brak danych — dodaj pierwszy wpis poniżej.</p>';
      return;
    }
    var W=440,H=210,PT=10,PR=12,PB=26,PL=52;
    var pts=[],c=0;
    data.forEach(function(e){c+=e.amount;pts.push(c)});
    var min=Math.min(0,Math.min.apply(null,pts));
    var max=Math.max.apply(null,pts);
    if(max===min)max=min+1;

    // nice Y ticks: 3-4 rounded values
    var span=max-min;
    var rawStep=span/3;
    var mag=Math.pow(10,Math.floor(Math.log(rawStep)/Math.LN10));
    var step=Math.ceil(rawStep/mag)*mag;
    var y0=Math.floor(min/step)*step;
    var ticks=[];
    for(var t=y0;t<=max+step*0.001;t+=step) ticks.push(t);
    min=Math.min(min,ticks[0]); max=Math.max(max,ticks[ticks.length-1]);

    var X=function(i){return pts.length===1?(PL+(W-PL-PR)/2):PL+(W-PL-PR)*i/(pts.length-1)};
    var Y=function(v){return H-PB-(H-PT-PB)*(v-min)/(max-min)};
    var fmtK=function(v){
      if(Math.abs(v)>=1000) return (v/1000).toLocaleString("pl-PL",{maximumFractionDigits:1})+" tys.";
      return Math.round(v).toLocaleString("pl-PL");
    };

    // Y grid + labels
    var grid="";
    ticks.forEach(function(v){
      grid+='<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+Y(v)+'" y2="'+Y(v)+'" stroke="#4d3c10" stroke-width="1"'+(v===0&&min<0?' stroke-dasharray="4 4"':'')+'/>';
      grid+='<text x="'+(PL-7)+'" y="'+(Y(v)+3.5)+'" text-anchor="end" font-size="10" fill="#8a7231">'+fmtK(v)+'</text>';
    });

    // X labels: first, middle, last (skip duplicates)
    var xl="";
    var idxs = pts.length===1 ? [0] : (pts.length===2 ? [0,pts.length-1] : [0,Math.floor((pts.length-1)/2),pts.length-1]);
    var seen={};
    idxs.forEach(function(i){
      var lab=fmtD(data[i].date);
      if(seen[lab])return; seen[lab]=1;
      var anchor = i===0?"start":(i===pts.length-1?"end":"middle");
      xl+='<text x="'+X(i)+'" y="'+(H-8)+'" text-anchor="'+anchor+'" font-size="10" fill="#8a7231">'+lab+'</text>';
    });

    // line path
    var d="M "+X(0)+" "+Y(pts[0]);
    for(var i=1;i<pts.length;i++){
      d+=" L "+X(i)+" "+Y(pts[i]);
    }
    var base=Y(Math.max(0,min));
    var fill=d+" L "+X(pts.length-1)+" "+base+" L "+X(0)+" "+base+" Z";

    box.innerHTML =
      '<svg viewBox="0 0 '+W+' '+H+'">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#ffc93c" stop-opacity=".3"/>'+
      '<stop offset="100%" stop-color="#ffc93c" stop-opacity="0"/></linearGradient></defs>'+
      grid+xl+
      '<path d="'+fill+'" fill="url(#g)"/>'+
      '<path d="'+d+'" fill="none" stroke="#ffc93c" stroke-width="2.5" stroke-linejoin="round"/>'+
      '<circle cx="'+X(pts.length-1)+'" cy="'+Y(pts[pts.length-1])+'" r="4" fill="#ffc93c"/>'+
      '</svg>';
  }

  $("form").onsubmit = function(ev){
    ev.preventDefault();
    var cfg = MODES[mode];
    var raw = $("amount").value.trim().replace(",",".").replace("−","-");
    if(raw==="" && cfg.def) raw = cfg.def;
    var v = parseFloat(raw);
    if(isNaN(v) || v===0){ $("error").textContent="Podaj kwotę różną od zera."; return; }
    if(v<0 && !cfg.negatives){ $("error").textContent="Na IKE zapisuj tylko wpłaty (dodatnie)."; return; }
    var arr = load();
    arr.push({id:Date.now(), date:$("date").value, amount:v});
    store(arr);
    render();
  };

  $("tab-ike").onclick=function(){mode="ike";render()};
  $("tab-osz").onclick=function(){mode="osz";render()};

  $("limit-edit").onclick=function(){
    var f=$("limit-form");
    var year=new Date().getFullYear();
    var cur=parseFloat(localStorage.getItem("kap_ike_limit_"+year))||28260;
    if(f.style.display==="none"){
      $("limit-input").value=cur;
      f.style.display="flex";
      $("limit-input").focus();
    } else {
      f.style.display="none";
    }
  };
  $("limit-save").onclick=function(){
    var year=new Date().getFullYear();
    var v=parseFloat($("limit-input").value.replace(",",".").replace(/\s/g,""));
    if(!isNaN(v)&&v>0){
      localStorage.setItem("kap_ike_limit_"+year,v);
      $("limit-form").style.display="none";
      render();
    }
  };

  render();
})();
</script>
</body>
</html>
