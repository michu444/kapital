# Plik w repo: .github/workflows/konto-tygodniowe.yml
# W każdą niedzielę o 10:00 czasu polskiego
name: Konto tygodniowe

on:
  schedule:
    # 8 UTC latem (CEST), 9 UTC zimą (CET) — send.js wybiera właściwy
    - cron: "0 8,9 * * 0"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install web-push
      - run: node send.js
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          SUBSCRIPTION: ${{ secrets.SUBSCRIPTION }}
          TARGET_HOUR: "10"
          BODY: "Uzupełnij swoje konto tygodniowe"
          TAG: "tydzien"
